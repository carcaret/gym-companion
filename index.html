<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e1e1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Gym Companion — Seguimiento de entrenamiento personal">
  <title>Gym Companion</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- MAIN APP -->
  <div id="app-shell" hidden>

    <!-- HOY -->
    <div id="view-hoy" class="view active">
      <header class="view-header">
        <h2 id="hoy-title">Rutinas</h2>
        <div class="header-right">
          <div id="hoy-badge" class="header-badge" hidden>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
          </div>
          <button id="sync-status-btn" class="sync-indicator" title="Estado de sincronización" aria-label="Estado de sincronización">
            <span id="sync-status-icon"></span>
          </button>
        </div>
      </header>
      <div id="hoy-content" class="view-body"></div>
    </div>

    <!-- HISTORIAL -->
    <div id="view-historial" class="view">
      <header class="view-header">
        <h2>Historial</h2>
      </header>
      <div id="historial-filters" class="filter-bar">
        <button class="chip-btn filter-btn active" data-filter="TODOS">Todos</button>
        <button class="chip-btn filter-btn" data-filter="DIA1">Día 1</button>
        <button class="chip-btn filter-btn" data-filter="DIA2">Día 2</button>
        <button class="chip-btn filter-btn" data-filter="DIA3">Día 3</button>
      </div>
      <div id="historial-content" class="view-body"></div>
    </div>

    <!-- GRÁFICAS -->
    <div id="view-graficas" class="view">
      <header class="view-header">
        <h2>Gráficas</h2>
      </header>
      <div id="graficas-controls" class="graficas-controls">
        <div class="date-range">
          <div class="input-group small">
            <label for="chart-from">Desde</label>
            <input type="date" id="chart-from">
          </div>
          <div class="input-group small">
            <label for="chart-to">Hasta</label>
            <input type="date" id="chart-to">
          </div>
        </div>
        <div class="input-group">
          <label>Ejercicio</label>
          <div class="searchable-select" id="chart-exercise-wrapper">
            <input type="text" id="chart-exercise-search" placeholder="Buscar ejercicio..." autocomplete="off">
            <button type="button" class="searchable-select-clear" id="chart-exercise-clear" aria-label="Limpiar selección">✕</button>
            <input type="hidden" id="chart-exercise-select">
            <div class="searchable-select-list" id="chart-exercise-list" hidden></div>
          </div>
        </div>
        <div class="chart-toggle">
          <button class="chip-btn toggle-btn active" data-chart="line">Líneas</button>
          <button class="chip-btn toggle-btn" data-chart="bar">Barras</button>
        </div>
      </div>
      <div id="graficas-content" class="view-body">
        <h3 class="chart-section-title">Volumen y e1RM</h3>
        <div class="chart-container mb-md"><canvas id="chart-canvas"></canvas></div>
        <h3 class="chart-section-title">Evolución del Peso</h3>
        <div class="chart-container"><canvas id="chart-canvas-weight"></canvas></div>
      </div>
    </div>

    <!-- AJUSTES -->
    <div id="view-ajustes" class="view">
      <header class="view-header">
        <h2>Ajustes</h2>
      </header>
      <div class="view-body settings-body">
        <section class="settings-section">
          <h3>GitHub API</h3>
          <div class="input-group">
            <label for="set-repo">Repositorio (usuario/repo)</label>
            <input type="text" id="set-repo" placeholder="usuario/repo">
          </div>
          <div class="input-group">
            <label for="set-branch">Rama</label>
            <input type="text" id="set-branch" placeholder="main" value="main">
          </div>
          <div class="input-group">
            <label for="set-pat">Personal Access Token</label>
            <input type="password" id="set-pat" placeholder="ghp_...">
          </div>
          <div class="input-group">
            <label for="set-path">Ruta del archivo JSON</label>
            <input type="text" id="set-path" placeholder="db.json" value="db.json">
          </div>
          <button class="btn-primary" id="save-github-btn">Guardar configuración</button>
          <button class="btn-secondary" id="test-github-btn">Probar conexión</button>
          <p id="github-status" class="status-msg" hidden></p>
        </section>
        <section class="settings-section">
          <h3>Datos</h3>
          <button class="btn-primary" id="sync-github-btn">Sincronizar con GitHub</button>
          <p id="sync-status" class="status-msg" hidden></p>
        </section>
        <p id="settings-version" class="app-version"></p>
      </div>
    </div>

    <!-- TAB BAR -->
    <nav id="tab-bar">
      <button class="tab active" data-view="hoy">
        <span class="tab-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg></span>
        <span class="tab-label">Rutinas</span>
      </button>
      <button class="tab" data-view="historial">
        <span class="tab-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
        <span class="tab-label">Historial</span>
      </button>
      <button class="tab" data-view="graficas">
        <span class="tab-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
        <span class="tab-label">Gráficas</span>
      </button>
      <button class="tab" data-view="ajustes">
        <span class="tab-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
        <span class="tab-label">Ajustes</span>
      </button>
    </nav>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal" id="modal-box">
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
      <div class="modal-actions" id="modal-actions"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
