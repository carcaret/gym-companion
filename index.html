<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6c5ce7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Gym Companion — Seguimiento de entrenamiento personal">
  <title>Gym Companion</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- LOGIN -->
  <div id="login-screen" class="screen active">
    <div class="login-container">
      <div class="login-logo">🏋️</div>
      <h1 class="login-title">Gym Companion</h1>
      <p class="login-subtitle">Tu progreso, tu fuerza</p>
      <form id="login-form" autocomplete="off">
        <div class="input-group">
          <label for="login-user">Usuario</label>
          <input type="text" id="login-user" autocomplete="username" required>
        </div>
        <div class="input-group">
          <label for="login-pass">Contraseña</label>
          <input type="password" id="login-pass" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-primary" id="login-btn">Iniciar sesión</button>
        <p id="login-error" class="error-msg" hidden>Usuario o contraseña incorrectos</p>
      </form>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app-shell" hidden>

    <!-- HOY -->
    <div id="view-hoy" class="view active">
      <header class="view-header">
        <h2 id="hoy-title">Hoy</h2>
        <div id="hoy-badge" class="header-badge" hidden>🏆</div>
      </header>
      <div id="hoy-content" class="view-body"></div>
    </div>

    <!-- HISTORIAL -->
    <div id="view-historial" class="view">
      <header class="view-header">
        <h2>Historial</h2>
      </header>
      <div id="historial-filters" class="filter-bar">
        <button class="filter-btn active" data-filter="TODOS">Todos</button>
        <button class="filter-btn" data-filter="LUNES">Lunes</button>
        <button class="filter-btn" data-filter="MIERCOLES">Miércoles</button>
        <button class="filter-btn" data-filter="VIERNES">Viernes</button>
      </div>
      <div id="historial-content" class="view-body"></div>
    </div>

    <!-- GRÁFICAS -->
    <div id="view-graficas" class="view">
      <header class="view-header">
        <h2>Gráficas</h2>
      </header>
      <div id="graficas-controls" class="graficas-controls">
        <div class="date-range">
          <div class="input-group small">
            <label for="chart-from">Desde</label>
            <input type="date" id="chart-from">
          </div>
          <div class="input-group small">
            <label for="chart-to">Hasta</label>
            <input type="date" id="chart-to">
          </div>
        </div>
        <div class="input-group">
          <label for="chart-exercise-select">Ejercicio</label>
          <select id="chart-exercise-select"></select>
        </div>
        <div class="chart-toggle">
          <button class="toggle-btn active" data-chart="line">Líneas</button>
          <button class="toggle-btn" data-chart="bar">Barras</button>
        </div>
      </div>
      <div id="graficas-content" class="view-body">
        <h3 class="chart-section-title">Volumen y e1RM</h3>
        <div class="chart-container" style="margin-bottom: 24px;"><canvas id="chart-canvas"></canvas></div>
        <h3 class="chart-section-title">Evolución del Peso</h3>
        <div class="chart-container"><canvas id="chart-canvas-weight"></canvas></div>
      </div>
    </div>

    <!-- AJUSTES -->
    <div id="view-ajustes" class="view">
      <header class="view-header">
        <h2>Ajustes</h2>
      </header>
      <div class="view-body settings-body">
        <section class="settings-section">
          <h3>🔑 GitHub API</h3>
          <div class="input-group">
            <label for="set-repo">Repositorio (usuario/repo)</label>
            <input type="text" id="set-repo" placeholder="usuario/repo">
          </div>
          <div class="input-group">
            <label for="set-branch">Rama</label>
            <input type="text" id="set-branch" placeholder="main" value="main">
          </div>
          <div class="input-group">
            <label for="set-pat">Personal Access Token</label>
            <input type="password" id="set-pat" placeholder="ghp_...">
          </div>
          <div class="input-group">
            <label for="set-path">Ruta del archivo JSON</label>
            <input type="text" id="set-path" placeholder="db.json" value="db.json">
          </div>
          <button class="btn-primary" id="save-github-btn">Guardar configuración</button>
          <button class="btn-secondary" id="test-github-btn">Probar conexión</button>
          <p id="github-status" class="status-msg" hidden></p>
        </section>
        <section class="settings-section">
          <h3>🔒 Cambiar contraseña</h3>
          <div class="input-group">
            <label for="set-old-pass">Contraseña actual</label>
            <input type="password" id="set-old-pass">
          </div>
          <div class="input-group">
            <label for="set-new-pass">Contraseña nueva</label>
            <input type="password" id="set-new-pass">
          </div>
          <button class="btn-primary" id="change-pass-btn">Cambiar contraseña</button>
          <p id="pass-status" class="status-msg" hidden></p>
        </section>
        <section class="settings-section">
          <h3>📦 Datos</h3>
          <button class="btn-secondary" id="export-btn">Exportar JSON</button>
          <div class="input-group">
            <label for="import-file">Importar JSON</label>
            <input type="file" id="import-file" accept=".json">
          </div>
        </section>
        <section class="settings-section">
          <button class="btn-danger" id="logout-btn">Cerrar sesión</button>
        </section>
      </div>
    </div>

    <!-- TAB BAR -->
    <nav id="tab-bar">
      <button class="tab active" data-view="hoy">
        <span class="tab-icon">💪</span>
        <span class="tab-label">Hoy</span>
      </button>
      <button class="tab" data-view="historial">
        <span class="tab-icon">📋</span>
        <span class="tab-label">Historial</span>
      </button>
      <button class="tab" data-view="graficas">
        <span class="tab-icon">📈</span>
        <span class="tab-label">Gráficas</span>
      </button>
      <button class="tab" data-view="ajustes">
        <span class="tab-icon">⚙️</span>
        <span class="tab-label">Ajustes</span>
      </button>
    </nav>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal" id="modal-box">
      <h3 id="modal-title"></h3>
      <div id="modal-body"></div>
      <div class="modal-actions" id="modal-actions"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
